<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — WebOwl</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0e0b1a;
    font-family: 'DM Sans', system-ui, sans-serif;
    color: white;
    text-align: center;
    padding: 24px;
  }
  .wrap { max-width: 480px; }
  .code {
    font-family: 'Instrument Serif', Georgia, serif;
    font-size: clamp(5rem, 15vw, 8rem);
    background: linear-gradient(135deg, #8b5cf6, #a78bfa, #d4a853);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 16px;
  }
  h1 {
    font-family: 'Instrument Serif', Georgia, serif;
    font-size: 1.8rem;
    font-weight: 400;
    margin-bottom: 12px;
  }
  p {
    color: rgba(255,255,255,0.5);
    margin-bottom: 32px;
    line-height: 1.6;
  }
  a {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 32px;
    background: #6c3dd1;
    color: white;
    text-decoration: none;
    border-radius: 10px;
    font-weight: 600;
    transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  }
  a:hover { background: #8b5cf6; transform: translateY(-2px); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <a href="/">← Back to Home</a>
  </div>
</body>
</html>
